version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: Next.js 15 (App Router)
  - ui_library: React 19 with Tailwind CSS 4
  - other: Shopify Storefront API, Sonner toast notifications, Headless UI
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Storefront home page showing featured products in a three-item grid and carousel.
  - path: /product/[handle]
    file: app/product/[handle]/page.tsx
    auth_required: false
    description: Dynamic product detail page with gallery, description, pricing, and related products.
  - path: /search
    file: app/search/page.tsx
    auth_required: false
    description: Product search results page with sorting and grid layout.
features:
  - name: Browse Featured Products
    description: Users can browse featured and curated products on the home page.
    files:
      - app/page.tsx
      - components/grid/three-items.tsx
      - components/carousel.tsx
      - components/layout/footer.tsx
    entry_route: /
    user_interactions:
      - Scroll through the home page content.
      - View featured product tiles in the three-item grid.
      - Interact with the product carousel navigation controls.
      - Click a product tile to open its product detail page.
    api_calls:
      - method: POST
        endpoint: Shopify Storefront GraphQL API (via lib/shopify)
    auth_required: false
  - name: Product Detail and Gallery
    description: Users can view detailed information for a specific product, including images, price, availability, and related products.
    files:
      - app/product/[handle]/page.tsx
      - components/product/gallery.tsx
      - components/product/product-description.tsx
      - components/grid/tile.tsx
      - lib/shopify/index.ts
    entry_route: /product/[handle]
    user_interactions:
      - Navigate to a product detail page from any product link.
      - Browse through the product image gallery.
      - Read product descriptions, price, and availability.
      - Scroll to and view related products and click them to navigate to other product pages.
    api_calls:
      - method: POST
        endpoint: Shopify Storefront GraphQL API for product details and recommendations (via lib/shopify)
    auth_required: false
  - name: Product Search and Sorting
    description: Users can search for products and view results in a responsive grid with sorting support.
    files:
      - app/search/page.tsx
      - components/layout/search/collections.tsx
      - components/layout/product-grid-items.tsx
      - components/grid/index.tsx
      - lib/constants.ts
      - lib/shopify/index.ts
    entry_route: /search
    user_interactions:
      - Enter a search query using the search UI in the navbar.
      - Submit the search to navigate to the search results page.
      - Change sorting options for search results.
      - Browse and scroll through search results in the grid.
      - Click a result item to open its product detail page.
    api_calls:
      - method: POST
        endpoint: Shopify Storefront GraphQL API for product search (via lib/shopify)
    auth_required: false
  - name: Shopping Cart and Toast Notifications
    description: Users can manage their shopping cart and see toast notifications for cart actions.
    files:
      - app/layout.tsx
      - components/cart/cart-context.tsx
      - components/cart/add-to-cart.tsx
      - components/cart/modal.tsx
      - components/cart/open-cart.tsx
      - components/cart/edit-item-quantity-button.tsx
      - components/cart/delete-item-button.tsx
      - components/welcome-toast.tsx
      - lib/shopify/mutations/cart.ts
      - lib/shopify/index.ts
    entry_route: /
    user_interactions:
      - Open the cart from the navbar or cart icon.
      - Add a product or variant to the cart from a product page.
      - Increase or decrease item quantity in the cart.
      - Remove items from the cart.
      - View toast notifications confirming cart actions.
    api_calls:
      - method: POST
        endpoint: Shopify Storefront GraphQL API for cart operations (create, add lines, update lines, remove lines) via lib/shopify
    auth_required: false
known_limitations:
  - issue: No user authentication or account management
    location: app and components (no auth-related routes or providers)
    impact: All cart and browsing behavior is anonymous; users cannot save carts or orders to an account.
  - issue: Limited error and loading state handling in some routes
    location: app/product/[handle]/page.tsx and app/search/page.tsx
    impact: Network or API errors may fallback to notFound or empty UI without detailed user-facing error messages.

version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js (App Router)
  - Tailwind CSS 4
  - Shopify Storefront GraphQL API
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Storefront home page with featured products carousel and marketing grid.
  - path: /product/[handle]
    file: app/product/[handle]/page.tsx
    auth_required: false
    description: Product detail page showing gallery, description, price, availability, and related products.
  - path: /search
    file: app/search/page.tsx
    auth_required: false
    description: Product search page with results grid based on query and sorting.
  - path: /search/[collection]
    file: app/search/[collection]/page.tsx
    auth_required: false
    description: Collection-specific search results with filters and sorting.
features:
  - name: Browse Featured Products on Home
    description: Users can land on the home page, view featured products in a grid and carousel, and navigate to product details.
    files:
      - app/page.tsx
      - components/grid/three-items.tsx
      - components/carousel.tsx
      - components/layout/footer.tsx
      - components/layout/navbar/index.tsx
    entry_route: /
    user_interactions:
      - Open the home page in the browser.
      - Scroll through featured products grid.
      - Click a product tile in the grid to open its product detail page.
      - Use the header navigation to go to the search page.
    api_calls:
      - method: POST
        endpoint: Shopify Storefront API (GraphQL) for featured products
    auth_required: false
  - name: View Product Details and Gallery
    description: Users can open a product page, view its image gallery and description, and see related products.
    files:
      - app/product/[handle]/page.tsx
      - components/product/gallery.tsx
      - components/product/product-description.tsx
      - components/grid/tile.tsx
      - lib/shopify/index.ts
      - lib/shopify/queries/*
    entry_route: /product/[handle]
    user_interactions:
      - Navigate to a product detail page from the home or search page.
      - View the main product image and cycle through the gallery thumbnails.
      - Read the product title, description, and price.
      - Scroll down to view the related products section.
      - Click a related product to navigate to its product page.
    api_calls:
      - method: POST
        endpoint: Shopify Storefront API (GraphQL) getProduct
      - method: POST
        endpoint: Shopify Storefront API (GraphQL) getProductRecommendations
    auth_required: false
  - name: Search Products
    description: Users can search for products using a query string and see the results in a responsive grid.
    files:
      - app/search/page.tsx
      - app/search/layout.tsx
      - components/layout/search/collections.tsx
      - components/layout/search/filter/index.tsx
      - components/layout/search/filter/*
      - components/layout/product-grid-items.tsx
      - components/grid/index.tsx
      - lib/shopify/index.ts
    entry_route: /search
    user_interactions:
      - Open the search page via header navigation or URL.
      - Enter a search term in the search input in the navbar.
      - Submit the search and wait for results.
      - View the total results count and query text.
      - Scroll through the results grid and click a product to go to its details page.
    api_calls:
      - method: POST
        endpoint: Shopify Storefront API (GraphQL) getProducts with query and sort params
    auth_required: false
  - name: Filter and Sort Products by Collection
    description: Users can browse products by collection and apply sorting options (e.g. price, relevance).
    files:
      - app/search/[collection]/page.tsx
      - app/search/layout.tsx
      - components/layout/search/collections.tsx
      - components/layout/search/filter/index.tsx
      - components/layout/search/filter/*
      - lib/constants.ts
    entry_route: /search/[collection]
    user_interactions:
      - Navigate to a collection from the left sidebar on the search page.
      - Change the sort dropdown in the right sidebar.
      - Observe product grid updating based on selected collection and sorting.
      - Click a product to navigate to its product detail page.
    api_calls:
      - method: POST
        endpoint: Shopify Storefront API (GraphQL) getCollection and getProducts
    auth_required: false
  - name: Shopping Cart and Add to Cart
    description: Users can add products to a cart, update quantities, and open a cart modal.
    files:
      - components/cart/cart-context.tsx
      - components/cart/add-to-cart.tsx
      - components/cart/modal.tsx
      - components/cart/open-cart.tsx
      - components/cart/edit-item-quantity-button.tsx
      - components/cart/delete-item-button.tsx
      - app/layout.tsx
      - lib/shopify/mutations/cart.ts
      - lib/shopify/index.ts
    entry_route: /
    user_interactions:
      - Open a product detail page.
      - Select a variant if required.
      - Click the Add to Cart button.
      - Open the cart using the header/cart button.
      - Increase and decrease item quantity in the cart.
      - Remove an item from the cart.
    api_calls:
      - method: POST
        endpoint: Shopify Storefront API (GraphQL) cartCreate / cartLinesAdd / cartLinesUpdate / cartLinesRemove
    auth_required: false
  - name: Global Navigation and Layout
    description: Users experience a consistent layout with navbar, footer, toast notifications, and cart state across routes.
    files:
      - app/layout.tsx
      - components/layout/navbar/index.tsx
      - components/layout/footer.tsx
      - components/welcome-toast.tsx
      - lib/shopify/index.ts
      - lib/utils.ts
    entry_route: /
    user_interactions:
      - Load any page and see navbar with logo and search.
      - Use navbar links to navigate between home, search, and product pages.
      - Trigger actions (e.g. add to cart) that display toast notifications.
      - Navigate across pages while cart contents persist.
    api_calls:
      - method: POST
        endpoint: Shopify Storefront API (GraphQL) getCart
    auth_required: false
known_limitations:
  - issue: No built-in user authentication routes (e.g. login, signup, account management).
    location: app/*
    impact: All features are anonymous, so tests assume a guest shopper flow only.
  - issue: Shopify Storefront API network failures or invalid credentials are not fully handled in the UI.
    location: lib/shopify/*
    impact: In case of API failures, pages may show empty states or generic errors without specific recovery UX.

